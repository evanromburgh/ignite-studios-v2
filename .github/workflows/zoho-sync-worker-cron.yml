name: Zoho Sync Worker Cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  invoke-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ensure required secret is configured
        env:
          SUPABASE_CRON_SECRET: ${{ secrets.SUPABASE_CRON_SECRET }}
        run: |
          if [ -z "$SUPABASE_CRON_SECRET" ]; then
            echo "Missing required GitHub secret: SUPABASE_CRON_SECRET"
            exit 1
          fi

      - name: Invoke Supabase zoho-sync-worker
        env:
          SUPABASE_CRON_SECRET: ${{ secrets.SUPABASE_CRON_SECRET }}
          WORKER_URL: https://cludixdjfecrzdbadynf.supabase.co/functions/v1/zoho-sync-worker
        run: |
          curl --fail-with-body --silent --show-error \
            -X POST "$WORKER_URL" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: $SUPABASE_CRON_SECRET" \
            -d '{}'
