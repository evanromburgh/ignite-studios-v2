<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ignite Studios | Property Reservation Portal</title>
    <link rel="icon" type="image/png" href="https://sales.moresonestate.co.za/favicon/favicon.png">
    <link rel="apple-touch-icon" href="https://sales.moresonestate.co.za/favicon/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        input, select, textarea, button {
            font-family: inherit;
        }
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="password"],
        input[type="number"] {
            padding-top: 0;
            padding-bottom: 0;
        }
        html, body {
            overflow-x: hidden;
            width: 100%;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            min-height: 100vh;
            margin: 0;
            color: #f4f4f5;
        }
        #root {
            overflow-x: hidden;
        }
        .liquid-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .liquid-glass-dark {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Border Beam Animation */
        .border-beam-container {
            position: relative;
            padding: 1px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .border-beam-container::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                transparent 280deg,
                rgba(255, 255, 255, 0.3) 320deg,
                transparent 360deg
            );
            animation: beam-rotate 4s linear infinite;
            z-index: 0;
        }
        @keyframes beam-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .border-beam-inner {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            background: black; /* Fallback */
        }
        
        @keyframes curtain-wipe {
            0% { transform: translateX(-100%); }
            48%, 52% { transform: translateX(0%); }
            100% { transform: translateX(100%); }
        }
        
        @keyframes logo-mask {
            0%, 2% { clip-path: inset(0 100% 0 0); opacity: 0; }
            48%, 52% { clip-path: inset(0 0 0 0); opacity: 1; }
            98%, 100% { clip-path: inset(0 0 0 100%); opacity: 0; }
        }

        .animate-curtain {
            animation: curtain-wipe 1.2s cubic-bezier(0.7, 0, 0.2, 1) forwards;
        }
        
        .animate-logo-mask {
            animation: logo-mask 1.2s cubic-bezier(0.7, 0, 0.2, 1) forwards;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.4);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
    </style></head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
